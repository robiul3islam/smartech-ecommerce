<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="container mx-auto py-12">
<h2 class="text-3xl font-bold mb-6 text-center">All Products</h2>

<div id="product-list"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
</div>
</div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>

<script>
const list = document.getElementById("product-list");

products.forEach(product=>{
list.innerHTML += `
<div class="bg-white p-4 rounded shadow">
<img src="${product.image}" class="h-48 w-full object-cover rounded">
<h3 class="text-lg font-semibold mt-3">${product.name}</h3>
<p class="text-blue-600 font-bold">$${product.price}</p>
<a href="product.html?id=${product.id}"
class="block mt-3 bg-gray-200 text-center py-2 rounded">View</a>
<button onclick="addToCart(${product.id})"
class="mt-2 bg-blue-600 text-white w-full py-2 rounded">
Add to Cart
</button>
</div>`;
});
</script>

</body>
</html>
