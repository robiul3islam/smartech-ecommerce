<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smartech BD Store</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<!-- Navbar -->
<nav class="bg-gradient-to-r from-blue-600 to-blue-400 text-white p-4 flex justify-between items-center">
  <h1 class="text-2xl font-bold">Smartech BD</h1>
  <div>
    <a href="#" id="cartBtn" class="mr-4 hover:underline">Cart (<span id="cartCount">0</span>)</a>
    <span id="userSection"></span>
  </div>
</nav>

<!-- Hero -->
<section class="bg-white p-8 shadow mt-4 mx-4 rounded-lg text-center">
  <h2 class="text-4xl font-bold mb-2">Welcome to Smartech BD</h2>
  <p class="text-gray-600">Best Tech Products with Amazing Discounts!</p>
</section>

<!-- Products -->
<section class="p-6">
  <div id="productContainer" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
</section>

<!-- Cart Modal -->
<div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center">
  <div class="bg-white p-6 rounded shadow w-full max-w-lg relative">
    <button onclick="closeCart()" class="absolute top-2 right-2 text-red-500 font-bold">X</button>
    <h2 class="text-2xl font-bold mb-4">Your Cart</h2>
    <div id="cartContainer"></div>
    <div class="mt-4">
      <h3 class="font-bold">Payment Info</h3>
      <p>bKash: 01XXXXXXXXX</p>
      <p>Nagad: 01XXXXXXXXX</p>
      <input id="customerName" placeholder="Your Name" class="border p-2 block mb-2 w-full rounded">
      <input id="transactionId" placeholder="Transaction ID" class="border p-2 block mb-2 w-full rounded">
      <button onclick="placeOrder()" class="bg-green-600 text-white px-4 py-2 rounded w-full hover:bg-green-700 mt-2">Submit Order</button>
    </div>
  </div>
</div>

<!-- Signup/Login Modal -->
<div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center">
  <div class="bg-white p-6 rounded shadow w-full max-w-md relative">
    <button onclick="closeAuth()" class="absolute top-2 right-2 text-red-500 font-bold">X</button>
    <div id="signupSection">
      <h2 class="text-2xl font-bold mb-4">Signup</h2>
      <input type="text" id="name" placeholder="Full Name" class="border p-2 mb-2 w-full rounded">
      <input type="email" id="email" placeholder="Email" class="border p-2 mb-2 w-full rounded">
      <input type="password" id="password" placeholder="Password" class="border p-2 mb-4 w-full rounded">
      <button onclick="signup()" class="bg-blue-600 text-white px-4 py-2 w-full rounded hover:bg-blue-700">Signup</button>
      <p class="mt-2 text-center">Already have account? <span class="text-blue-600 cursor-pointer" onclick="showLogin()">Login</span></p>
    </div>
    <div id="loginSection" class="hidden">
      <h2 class="text-2xl font-bold mb-4">Login</h2>
      <input type="email" id="loginEmail" placeholder="Email" class="border p-2 mb-2 w-full rounded">
      <input type="password" id="loginPassword" placeholder="Password" class="border p-2 mb-4 w-full rounded">
      <button onclick="login()" class="bg-blue-600 text-white px-4 py-2 w-full rounded hover:bg-blue-700">Login</button>
      <p class="mt-2 text-center">No account? <span class="text-blue-600 cursor-pointer" onclick="showSignup()">Signup</span></p>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div id="adminModal" class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center">
  <div class="bg-white p-6 rounded shadow w-full max-w-lg relative">
    <button onclick="closeAdmin()" class="absolute top-2 right-2 text-red-500 font-bold">X</button>
    <div id="adminLogin">
      <h2 class="text-2xl font-bold mb-4">Admin Login</h2>
      <input type="password" id="adminPass" placeholder="Admin Password" class="border p-2 mb-2 w-full rounded">
      <button onclick="checkAdmin()" class="bg-blue-600 text-white px-4 py-2 rounded w-full hover:bg-blue-700">Login</button>
    </div>
    <div id="adminPanel" class="hidden">
      <h2 class="text-2xl font-bold mb-4">Add Product</h2>
      <input id="pName" placeholder="Product Name" class="border p-2 mb-2 w-full rounded">
      <input id="pPrice" type="number" placeholder="Price" class="border p-2 mb-2 w-full rounded">
      <input id="pDiscount" type="number" placeholder="Discount %" class="border p-2 mb-2 w-full rounded">
      <input id="pDetails" placeholder="Details" class="border p-2 mb-2 w-full rounded">
      <input id="pImage" placeholder="Image URL" class="border p-2 mb-2 w-full rounded">
      <button onclick="addProduct()" class="bg-green-600 text-white px-4 py-2 w-full rounded hover:bg-green-700 mb-4">Add Product</button>
      <h3 class="text-xl font-bold mb-2">Orders</h3>
      <div id="orderContainer"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
