<!DOCTYPE html>
<html>
<head>
  <title>Smartech BD</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-blue-600 text-white p-4 flex justify-between">
  <h1 class="font-bold text-xl">Smartech BD</h1>
  <div>
    <a href="cart.html" class="mr-4">Cart</a>
    <span id="userSection"></span>
  </div>
</nav>

<!-- Hero Section -->
<div class="bg-white p-8 text-center shadow">
  <h2 class="text-3xl font-bold">Best Tech Products</h2>
  <p class="text-gray-600 mt-2">Discount Available Now 🔥</p>
</div>

<!-- Products -->
<div class="p-6">
  <div id="productContainer" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
</div>

<script src="js/auth.js"></script>
<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script>
  // Display products
  displayProducts("productContainer");

  // Show user login status
  let userEmail = localStorage.getItem("loggedInUser");
  let userSection = document.getElementById("userSection");
  if(userEmail){
    userSection.innerHTML = `<span class="mr-2">${userEmail}</span>
      <button onclick="logout()" class="bg-red-500 px-2 rounded">Logout</button>`;
  } else {
    userSection.innerHTML = `<a href="login.html" class="mr-2">Login</a>
      <a href="signup.html">Signup</a>`;
  }
</script>
</body>
</html>
