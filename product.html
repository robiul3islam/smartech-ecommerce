<!DOCTYPE html>
<html>
<head>
<title>Product Details</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="container mx-auto py-12" id="product-details"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get("id"));
const product = products.find(p=>p.id===id);

document.getElementById("product-details").innerHTML = `
<div class="bg-white p-8 rounded shadow max-w-3xl mx-auto">
<img src="${product.image}" class="w-full h-64 object-cover rounded">
<h2 class="text-2xl font-bold mt-4">${product.name}</h2>
<p class="text-blue-600 text-xl font-bold mt-2">$${product.price}</p>
<button onclick="addToCart(${product.id})"
class="mt-6 bg-blue-600 text-white px-6 py-2 rounded">
Add to Cart
</button>
</div>`;
</script>

</body>
</html>
